<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>李彥綸 - AI 數位入口</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        html, body { margin: 0; padding: 0; height: 100dvh; width: 100vw; overflow: hidden; background-color: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; }

        .main-wrapper { width: 100%; max-width: 400px; display: flex; flex-direction: column; padding: 20px; height: 100%; transition: max-width 0.3s; }
        
        /* 電腦版優化 */
        @media (min-width: 768px) { .main-wrapper { max-width: 600px; } }

        .profile-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .profile-pic { width: 75px; height: 75px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); object-fit: cover; }
        .name-tag { margin-top: 5px; font-size: 17px; font-weight: bold; }

        .card-container { flex-grow: 1; position: relative; width: 100%; margin: 10px 0; border-radius: 12px; overflow: hidden; display: flex; align-items: center; }
        .face { position: absolute; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; }
        .face.active { display: flex; }
        .face img { width: 100%; height: 100%; object-fit: contain; }
        
 .btn-list { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    width: 100%; 
    max-width: 400px; /* 強制按鈕區塊不超過 400px，維持手機般的視覺比例 */
    margin: 0 auto;  /* 讓按鈕在寬螢幕下置中 */
    margin-top: auto; 
}
        .btn { background: rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 10px; text-align: center; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.15); font-size: 14px; }

        /* 全螢幕引導層 */
        #overlay { position: fixed; top:0; left:0; width:100vw; height:100dvh; background: #0f172a; z-index: 10000; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #sliderView { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: black; z-index: 9999; justify-content: center; align-items: center; }
        #sliderImg { max-width: 100vw; max-height: 100dvh; object-fit: contain; }
    </style>
</head>
<body>

    <div id="overlay" onclick="enterApp()">點擊進入數位名片</div>

    <div class="main-wrapper">
        <div class="profile-section">
            <img src="https://king-newton.github.io/cards/pic-jimmy.jpg" class="profile-pic">
            <div class="name-tag">李彥綸 (Jimmy)</div>
        </div>

        <div class="card-container">
            <div style="position:absolute; top:0; left:0; width:50%; height:100%; z-index:10;" onclick="navigate('left')"></div>
            <div style="position:absolute; top:0; right:0; width:50%; height:100%; z-index:10;" onclick="navigate('right')"></div>
            <div class="face active" id="p0"><img src="https://king-newton.github.io/cards/jimmy-ch1.jpg"></div>
            <div class="face" id="p1"><img src="https://king-newton.github.io/cards/jimmy-en1.jpg"></div>
            <div class="face" id="p2"><img src="https://king-newton.github.io/cards/jimmy-ch2.jpg"></div>
            <div class="face" id="p3"><img src="https://king-newton.github.io/cards/jimmy-en2.jpg"></div>
        </div>

        <div class="btn-list">
            <a href="#" class="btn">公司官網</a>
            <a href="#" class="btn">最新 AI 上位機產品</a>
            <a href="#" class="btn" onclick="openSlider()">智慧綠能解決方案</a>
            <a href="https://king-newton.github.io/cards/contact-jimmy.vcf" class="btn">加入通訊錄</a>
        </div>
    </div>

    <div id="sliderView" onclick="nextSlide()"><img id="sliderImg" src=""></div>

    <script>
        function enterApp() {
            document.getElementById('overlay').style.display = 'none';
            document.documentElement.requestFullscreen().catch(err => {});
        }
        
        let current = 0;
        const map = { 0: { left: 2, right: 1 }, 1: { left: 3, right: 0 }, 2: { left: 3, right: 0 }, 3: { left: 2, right: 1 } };
        function navigate(dir) {
            document.getElementById('p' + current).classList.remove('active');
            current = map[current][dir];
            document.getElementById('p' + current).classList.add('active');
        }

        const slides = Array.from({length: 13}, (_, i) => `https://king-newton.github.io/cards/SGES${i+1}.jpg`);
        let slideIdx = 0;
        function openSlider() { event.preventDefault(); document.getElementById('sliderView').style.display = 'flex'; document.getElementById('sliderImg').src = slides[slideIdx]; }
        function nextSlide() {
            slideIdx++;
            if (slideIdx < slides.length) { document.getElementById('sliderImg').src = slides[slideIdx]; } 
            else { slideIdx = 0; document.getElementById('sliderView').style.display = 'none'; }
        }
    </script>
</body>
</html>
