<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>李彥綸 - AI 數位入口</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        html, body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            overflow: hidden; background-color: #0f172a; color: white; font-family: sans-serif;
            overscroll-behavior: none; display: flex; justify-content: center;
        }

        /* 直式：向上靠攏，減少頂部空隙 */
        body { align-items: flex-start; padding-top: 10px; }

        .main-wrapper { width: 100%; max-width: 350px; display: flex; flex-direction: column; align-items: center; }

        /* 頭像區：恢復正常大小 */
        .profile-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .profile-pic { width: 75px; height: 75px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); object-fit: cover; }
        .name-tag { margin-top: 5px; font-size: 17px; font-weight: bold; }

        .card-container { position: relative; width: 100%; aspect-ratio: 1.7 / 1; cursor: pointer; margin-bottom: 10px; border-radius: 12px; overflow: hidden; }
        
        /* 橫式專用頭像容器 (預設在名片內) */
        .portrait-overlay { display: none; }

        .face { position: absolute; width: 100%; height: 100%; display: none; }
        .face.active { display: block; }
        .face img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-list { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .btn { background: rgba(255, 255, 255, 0.08); padding: 12px; border-radius: 10px; text-align: center; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.15); font-size: 14px; }

        /* 橫式滿版：強制定位頭像於名片內 */
        @media (orientation: landscape) and (max-width: 900px) {
            body { align-items: center; }
            .profile-section, .btn-list { display: none !important; }
            
            .portrait-overlay { 
                display: block; position: absolute; top: 15px; left: 15px; z-index: 100; 
            }
            .portrait-overlay img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; }

            .card-container { 
                max-width: 100vw !important; width: 100vw !important; height: 100vh !important; 
                margin: 0 !important; border-radius: 0 !important; 
            }
            .face img { object-fit: contain !important; background: #000; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="profile-section" id="profileBtn">
            <img src="https://king-newton.github.io/cards/pic-jimmy.jpg" class="profile-pic">
            <div class="name-tag">李彥綸 (Jimmy)</div>
        </div>

        <div class="card-container">
            <!-- 橫式顯示用 -->
            <div class="portrait-overlay"><img src="https://king-newton.github.io/cards/pic-jimmy.jpg"></div>

            <div style="position:absolute; top:0; left:0; width:50%; height:100%; z-index:10;" onclick="navigate('left')"></div>
            <div style="position:absolute; top:0; right:0; width:50%; height:100%; z-index:10;" onclick="navigate('right')"></div>
            <div class="face active" id="p0"><img src="https://king-newton.github.io/cards/jimmy-ch1.jpg"></div>
            <div class="face" id="p1"><img src="https://king-newton.github.io/cards/jimmy-en1.jpg"></div>
            <div class="face" id="p2"><img src="https://king-newton.github.io/cards/jimmy-ch2.jpg"></div>
            <div class="face" id="p3"><img src="https://king-newton.github.io/cards/jimmy-en2.jpg"></div>
        </div>

        <div class="btn-list">
            <a href="#" class="btn">公司官網</a>
            <a href="#" class="btn">最新 AI 上位機產品</a>
            <a href="https://king-newton.github.io/cards/contact-jimmy.vcf" class="btn">加入通訊錄</a>
        </div>
    </div>

    <script>
        document.getElementById('profileBtn').addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            }
        });
        let current = 0;
        const map = { 0: { left: 2, right: 1 }, 1: { left: 3, right: 0 }, 2: { left: 3, right: 0 }, 3: { left: 2, right: 1 } };
        function navigate(dir) {
            document.getElementById('p' + current).classList.remove('active');
            current = map[current][dir];
            document.getElementById('p' + current).classList.add('active');
        }
    </script>
</body>
</html>
