<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>李彥綸 - AI 數位入口</title>
    <style>
        html, body { margin: 0; padding: 10px; height: 100%; width: 100%; overflow: hidden; background-color: #0f172a; color: white; font-family: sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; }

        .main-wrapper { position: relative; width: 100%; max-width: 350px; display: flex; flex-direction: column; align-items: center; }

        /* 菱形資訊層 - 間隔縮小 */
        .overlay-info { 
            position: relative; z-index: 20; display: flex; flex-direction: column; align-items: center;
            margin-bottom: 5px; /* 縮小與名片距離 */
        }
        .profile-pic { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        .diamond-name { 
            margin-top: -10px; background: white; color: #0f172a; 
            padding: 3px 12px; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            font-weight: bold; font-size: 13px;
        }

        /* 名片區 - 間隔縮小 */
        .card-container { position: relative; width: 100%; aspect-ratio: 1.7 / 1; cursor: pointer; margin-bottom: 10px; }
        .face { position: absolute; width: 100%; height: 100%; border-radius: 12px; overflow: hidden; display: none; }
        .face.active { display: block; }
        .face img { width: 100%; height: 100%; object-fit: cover; }
        
        .nav-left, .nav-right { position: absolute; top: 0; width: 50%; height: 100%; z-index: 10; }
        .nav-left { left: 0; } .nav-right { right: 0; }

        /* 按鈕區 - 間隔縮小 */
        .btn-list { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .btn { background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 8px; text-align: center; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); font-size: 14px; }

        /* 橫式滿版 */
        @media (orientation: landscape) and (max-width: 900px) {
            .overlay-info, .btn-list { display: none !important; }
            .card-container { max-width: 100vw; height: 100vh; margin: 0; border-radius: 0; }
            .face img { object-fit: contain; background: #000; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- 菱形資訊層 -->
        <div class="overlay-info">
            <img src="https://king-newton.github.io/cards/pic-jimmy.jpg" class="profile-pic">
            <div class="diamond-name">李彥綸 (Jimmy)</div>
        </div>

        <div class="card-container">
            <div class="nav-left" onclick="navigate('left')"></div>
            <div class="nav-right" onclick="navigate('right')"></div>
            <div class="face active" id="p0"><img src="https://king-newton.github.io/cards/jimmy-ch1.jpg"></div>
            <div class="face" id="p1"><img src="https://king-newton.github.io/cards/jimmy-en1.jpg"></div>
            <div class="face" id="p2"><img src="https://king-newton.github.io/cards/jimmy-ch2.jpg"></div>
            <div class="face" id="p3"><img src="https://king-newton.github.io/cards/jimmy-en2.jpg"></div>
        </div>

        <div class="btn-list">
            <a href="#" class="btn">公司官網</a>
            <a href="#" class="btn">最新 AI 上位機產品</a>
            <a href="https://king-newton.github.io/cards/contact-jimmy.vcf" class="btn">加入通訊錄</a>
        </div>
    </div>

    <script>
        let current = 0;
        const map = { 0: { left: 2, right: 1 }, 1: { left: 3, right: 0 }, 2: { left: 3, right: 0 }, 3: { left: 2, right: 1 } };
        function navigate(dir) {
            document.getElementById('p' + current).classList.remove('active');
            current = map[current][dir];
            document.getElementById('p' + current).classList.add('active');
        }
    </script>
</body>
</html>
