<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>李彥綸 - 數位名片</title>
    <style>
        body { 
            margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background-color: #f4f4f4; flex-direction: row; 
            gap: 20px; padding: 20px;
        }

        /* QR Code 區域 */
        .qr-section { width: 120px; text-align: center; }
        .qr-section img { width: 100%; border-radius: 10px; }
        .qr-text { font-size: 12px; margin-top: 8px; color: #555; }

        /* 名片區域 (移除原本的 .vcf-link) */
        .flip-card { 
            width: 90vw; max-width: 400px; aspect-ratio: 1.7 / 1; 
            perspective: 1000px; cursor: pointer;
        }

        .flip-card-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s; transform-style: preserve-3d; 
        }

        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }

        .flip-card-front, .flip-card-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 15px;
            overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .flip-card-back { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* 手機直式螢幕排版調整 */
        @media (max-width: 600px) {
            body { flex-direction: column; }
            .qr-section { width: 100px; }
        }
    </style>
</head>
<body>

    <div class="qr-section">
        <a href="https://king-newton.github.io/cards/contact-jimmy.vcf">
            <img src="https://king-newton.github.io/cards/king-Newton.png" alt="儲存聯絡人">
        </a>
        <div class="qr-text">點擊儲存聯絡人</div>
    </div>

    <div class="flip-card">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="https://king-newton.github.io/cards/jimmy-ch1.jpg" alt="名片正面">
            </div>
            <div class="flip-card-back">
                <img src="https://king-newton.github.io/cards/jimmy-ch2.jpg" alt="名片背面">
            </div>
        </div>
    </div>

</body>
</html>
