<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>李彥綸 - 數位名片</title>
    <style>
        body { 
            margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background-color: #f4f4f4; flex-direction: row; 
            gap: 20px; padding: 20px;
        }

        /* 確保容器高度對齊 */
        .container { display: flex; align-items: stretch; gap: 20px; height: 190px; }

        /* QR Code 區域設定，讓它與名片高度一致 */
        .qr-section { width: 190px; display: flex; flex-direction: column; justify-content: center; }
        .qr-section a { display: block; height: 100%; }
        .qr-section img { width: 100%; height: 100%; object-fit: contain; border-radius: 15px; }
        
        /* 名片區域維持原本設定 */
        .flip-card { 
            width: 323px; aspect-ratio: 1.7 / 1; 
            perspective: 1000px; cursor: pointer;
        }

        .flip-card-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s; transform-style: preserve-3d; 
        }

        .flip-card.active .flip-card-inner { transform: rotateY(180deg); }

        .flip-card-front, .flip-card-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 15px;
            overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .flip-card-back { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: cover; display: block; }

        @media (max-width: 600px) {
            .container { flex-direction: column; height: auto; }
            .qr-section { width: 90vw; height: 90vw; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- QR Code 區塊 -->
        <div class="qr-section">
            <a href="https://king-newton.github.io/cards/contact-jimmy.vcf">
                <img src="https://king-newton.github.io/cards/King-Newton.png" alt="儲存聯絡人">
            </a>
        </div>

        <!-- 名片翻轉區塊 -->
        <div class="flip-card" id="card" onclick="toggleCard()">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="https://king-newton.github.io/cards/jimmy-ch1.jpg" alt="名片正面">
                </div>
                <div class="flip-card-back">
                    <img src="https://king-newton.github.io/cards/jimmy-ch2.jpg" alt="名片背面">
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleCard() {
            var card = document.getElementById('card');
            card.classList.toggle('active');
        }
    </script>
</body>
</html>
