<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>李彥綸 - 數位名片</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f4f4f4; overflow: hidden; }

        /* 讓容器充滿手機螢幕 */
        .card-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        .flip-card {
            background-color: transparent;
            width: 90vw; /* 佔螢幕寬度 90% */
            max-width: 500px;
            aspect-ratio: 1.7 / 1; /* 保持名片比例 */
            perspective: 1000px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        /* JavaScript 控制翻轉 */
        .flip-card.active .flip-card-inner { transform: rotateY(180deg); }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .flip-card-back { transform: rotateY(180deg); }

        img { width: 100%; height: 100%; border-radius: 15px; object-fit: cover; display: block; }
    </style>
</head>
<body>

    <div class="card-wrapper">
        <div class="flip-card" id="card" onclick="handleCardClick()">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="https://king-newton.github.io/cards/jimmy-ch1.jpg" alt="名片正面">
                </div>
                <div class="flip-card-back">
                    <img src="https://king-newton.github.io/cards/jimmy-ch2.jpg" alt="名片背面">
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleCardClick() {
            var card = document.getElementById('card');
            
            // 如果正面還沒翻轉，點擊就翻到背面
            if (!card.classList.contains('active')) {
                card.classList.add('active');
            } 
            // 如果已經翻到背面了，點擊就執行下載
            else {
                window.location.href = "https://king-newton.github.io/cards/contact-jimmy.vcf";
            }
        }
    </script>
</body>
</html>
