<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>李彥綸 - 數位名片</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background-color: #f4f4f4; }

        /* 讓連結包覆整個名片區域，並設定充滿手機螢幕比例 */
        .vcf-link { 
            display: block; 
            text-decoration: none; 
            width: 90vw; 
            max-width: 500px; 
            aspect-ratio: 1.7 / 1; 
            cursor: pointer;
        }

        .flip-card { 
            background-color: transparent; 
            width: 100%; 
            height: 100%; 
            perspective: 1000px; 
        }

        .flip-card-inner { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            transition: transform 0.6s; 
            transform-style: preserve-3d; 
        }

        /* 滑鼠移入或手指觸碰時自動翻轉 */
        .flip-card:hover .flip-card-inner { 
            transform: rotateY(180deg); 
        }

        .flip-card-front, .flip-card-back { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .flip-card-back { transform: rotateY(180deg); }

        img { width: 100%; height: 100%; object-fit: cover; display: block; }
    </style>
</head>
<body>

    <!-- 點擊此區域即可觸發 .vcf 檔案下載 -->
    <a href="https://king-newton.github.io/cards/contact-jimmy.vcf" class="vcf-link">
        <div class="flip-card">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="https://king-newton.github.io/cards/jimmy-ch1.jpg" alt="名片正面">
                </div>
                <div class="flip-card-back">
                    <img src="https://king-newton.github.io/cards/jimmy-ch2.jpg" alt="名片背面">
                </div>
            </div>
        </div>
    </a>

</body>
</html>
