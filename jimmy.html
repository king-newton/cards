<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李彥綸 - 數位名片</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        
        /* 移除預設連結樣式 */
        .vcf-link { display: block; text-decoration: none; width: 300px; margin: auto; }
        
        /* 翻轉卡片容器 */
        .flip-card { background-color: transparent; width: 300px; height: 180px; margin: auto; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card:hover .flip-card-inner, .flip-card.active .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }
        .flip-card-back { transform: rotateY(180deg); }
        
        img { width: 100%; height: 100%; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <!-- 將連結包覆在名片容器外 -->
    <a href="https://king-newton.github.io/cards/contact-jimmy.vcf" class="vcf-link">
        <div class="flip-card" onclick="this.classList.toggle('active')">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img src="https://king-newton.github.io/cards/jimmy-ch1.jpg" alt="名片正面">
                </div>
                <a href="https://king-newton.github.io/cards/contact-jimmy.vcf" class="vcf-link">
                <div class="flip-card-back">
                    <img src="https://king-newton.github.io/cards/jimmy-ch2.jpg" alt="名片背面">
                </div>
            </div>
        </div>
    </a>

    <script>
        // 為了防止點擊卡片翻轉時同時觸發連結下載，可加入以下邏輯：
        document.querySelector('.flip-card').addEventListener('click', function(e) {
            e.preventDefault(); // 阻止連結跳轉
            this.classList.toggle('active');
        });
    </script>
</body>
</html>
