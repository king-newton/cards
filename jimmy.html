<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 加入 fixed 設定，防止手機瀏覽器縮放或反彈 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>李彥綸 - 數位名片</title>
    <style>
        /* 強制移除所有捲動與邊界空間 */
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #f4f4f4; 
        }

        body { 
            display: flex; justify-content: center; align-items: center; 
            box-sizing: border-box; padding: 10px; 
        }

        .container { 
            display: flex; align-items: center; gap: 20px; 
            max-width: 800px; width: 100%; 
        }

        .qr-section { flex: 1; max-width: 200px; }
        .qr-section img { width: 100%; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: block; }
        
        .card-container { flex: 2; position: relative; width: 100%; aspect-ratio: 1.7 / 1; }
        .face { position: absolute; width: 100%; height: 100%; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.3); display: none; }
        .face.active { display: block; }
        img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .nav-left { position: absolute; left: 0; top: 0; width: 50%; height: 100%; cursor: pointer; z-index: 10; }
        .nav-right { position: absolute; right: 0; top: 0; width: 50%; height: 100%; cursor: pointer; z-index: 10; }

        /* 手機版設定：強制垂直排列且不留捲動空間 */
        @media (max-width: 600px) {
            body { align-items: center; } /* 在手機上垂直置中，避免上方留白 */
            .container { flex-direction: column; gap: 10px; }
            .qr-section { max-width: 100px; } 
            .card-container { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="qr-section">
            <a href="https://king-newton.github.io/cards/contact-jimmy.vcf">
                <img src="https://king-newton.github.io/cards/King-Newton.png" alt="儲存聯絡人">
            </a>
        </div>

        <div class="card-container">
            <div class="nav-left" onclick="navigate('left')"></div>
            <div class="nav-right" onclick="navigate('right')"></div>

            <div class="face active" id="p0"><img src="https://king-newton.github.io/cards/jimmy-ch1.jpg"></div>
            <div class="face" id="p1"><img src="https://king-newton.github.io/cards/jimmy-en1.jpg"></div>
            <div class="face" id="p2"><img src="https://king-newton.github.io/cards/jimmy-ch2.jpg"></div>
            <div class="face" id="p3"><img src="https://king-newton.github.io/cards/jimmy-en2.jpg"></div>
        </div>
    </div>

    <script>
        let current = 0;
        const map = {
            0: { left: 2, right: 1 },
            1: { left: 3, right: 0 },
            2: { left: 3, right: 0 },
            3: { left: 2, right: 1 }
        };

        function navigate(dir) {
            document.getElementById('p' + current).classList.remove('active');
            current = map[current][dir];
            document.getElementById('p' + current).classList.add('active');
        }
    </script>
</body>
</html>
